# 上下文动作 v2：按 Theme → 文件/目录 分组（workspace .cursor/ 下同名文件优先）
# skill id 须存在于默认 agent 的 .cursor/skills；可用 id 或 skill_id 字段
# execution: task（默认，后台任务）| interactive / chat（交互式临时对话，不保存会话）
#
# themes.common（或顶层 common:）：全主题通用 Skill，与当前工作空间 theme 叠加；
# 同一 skill_id 在专用 theme 与 common 均配置时，专用 theme 优先（先匹配）。

version: 2

themes:
  common:
    files:
      - suffix: .md
        skills:
          - id: doc-review-file
            label: 审阅文档（通用）
      - suffix: *
        skills:
          - id: file-info-preview
            label: 文件总结（通用）
    directories:
      - id: directory-stats
        label: 目录统计
        execution: interactive

  documentation:
    files:
      - suffix: .md
        skills:
          - id: doc-review-file
            label: 审阅此文档
          - id: doc-polish-file
            label: 润色此文档
      - suffix: .mdx
        skills:
          - id: doc-review-file
            label: 审阅此文档
    directories:
      - id: doc-gen-module-design
        label: 生成模块设计文档
      - id: doc-sync-module-design
        label: 同步模块设计文档
      - id: doc-gen-business-design
        label: 生成业务设计文档
      - id: doc-sync-business-design
        label: 同步业务设计文档

  standard:
    files:
      - suffixes: [.py, .ts, .tsx, .js, .jsx, .go, .java]
        skills:
          - id: std-file-review
            label: 审查此文件
